name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create target directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script_stop: true
          script: |
            mkdir -p "${{ secrets.DEPLOY_PATH }}"

      - name: Copy project files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "app,scripts,pyproject.toml,uv.lock,docker-compose.yml"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0
          overwrite: true
          rm: false
          tar_dereference: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: ENV_FILE
          command_timeout: 30m
          script_stop: true
          script: |
            set -e
            export PATH="$HOME/.local/bin:$PATH"
            export UV_TORCH_BACKEND=cpu
            cd "${{ secrets.DEPLOY_PATH }}"

            printf '%s\n' "$ENV_FILE" > .env

            docker compose up -d mongodb qdrant

            if ! command -v uv >/dev/null 2>&1; then
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"
            fi

            uv sync --no-dev

            pkill -f "uvicorn app.main:app" || true
            sleep 3
            nohup .venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 < /dev/null &
            disown $!

            sleep 5
            curl -sf http://localhost:8000/health || { echo "=== 서버 기동 실패 ==="; cat uvicorn.log; exit 1; }
